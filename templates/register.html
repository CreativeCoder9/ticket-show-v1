{% extends "base.html" %}
{% block content %}
<style>
   #signup-form {
   padding:25px;
   box-shadow: rgba(149, 157, 165, 0.2) 0px 8px 24px;
   min: width 300px;
   margin-top:-120px;
   }
</style>

<!-- navbar -->
<nav class="navbar navbar-light navbar-expand-md fixed-top navbar-shrink py-3" id="mainNav">
        <div class="container">
          <img src="../static/images/Ticket%20Show%20Logo.png" width="194" height="66">
          <button data-bs-toggle="collapse" class="navbar-toggler" data-bs-target="#navcol-1">
            <span class="visually-hidden">Toggle navigation</span><span class="navbar-toggler-icon"></span></button>
            <div class="collapse navbar-collapse" id="navcol-1">
                <ul class="navbar-nav mx-auto">
                    <li class="nav-item"><a class="nav-link" href="/">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="/dashboard"> Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link" href="/login">Log in</a></li>
                    <li class="nav-item"><a class="nav-link active" href="/register">Register </a></li>
                </ul><a class="btn btn-primary shadow" role="button" href="/admin">For Admins</a>
            </div>
        </div>
</nav>
 
<div id="home-page" class="container ">
  <divclass="col-8">
    <h1 class="fw-bold">Welcome to the Show :)</h1>
    <h5>Book your shows & share your reviews, because they matter....</h5>
  </div>
   <div id = "signup-form" class="col -8 container mt-3 mb-5">
      <div>
         <form action="{{url_for('registration')}}" method="POST">
            <div class="form-group">
               <label for="email">Email address</label>
               <input name="email" type="email" class="form-control" id="email" required>
               <small id="emailHelp" class="form-text text-muted">We'll never share your email with anyone else.</small>
            </div>
            <div class="form-group">
               <label for="password">Password</label>
               <input name="password" type="password" class="form-control" id="password" required>
            </div>
            <div class="form-group form-check">
               <input name="check" type="checkbox" class="form-check-input" id="check">
               <label class="form-check-label" for="check">Remember me</label>
            </div>
            <button id="registration-button" type="submit" class="btn btn-primary mb-2">Sign up</button> 
         </form>
        <a href="/login">Already have an account? login here.</a>
      </div>
   </div>
</div>
</div>
{% endblock %}
