{% extends "base.html" %}
{% block content %}
<style>
   #login-form {
   padding:25px;
   box-shadow: rgba(149, 157, 165, 0.2) 0px 8px 24px;
   min: width 300px;;
   width: 30%;
   /*     text-align:center; */
   }
   #login-button {
   width:200px;
   }
</style>

<!-- nav bar -->
<nav class="navbar navbar-light navbar-expand-md fixed-top navbar-shrink py-3" id="mainNav">
        <div class="container">
          <img src="../static/images/Ticket%20Show%20Logo.png" width="194" height="66">
          <button data-bs-toggle="collapse" class="navbar-toggler" data-bs-target="#navcol-1">
            <span class="visually-hidden">Toggle navigation</span><span class="navbar-toggler-icon"></span></button>
            <div class="collapse navbar-collapse" id="navcol-1">
                <ul class="navbar-nav mx-auto">
                    <li class="nav-item"><a class="nav-link" href="/">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="/dashboard"> Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link" href="/login">Log in</a></li>
                    <li class="nav-item"><a class="nav-link" href="/register">Register</a></li>
                </ul><a class="btn btn-p shadow" role="button" href="/admin">For Admins</a>
            </div>
        </div>
</nav>

<div class="container-fluid min-vh-100">
   <div id = "login-form" class="container">
      <div class="my-auto">
         <h2 class="fw-bold">Admin Login</h2>
         <form action="{{url_for("admin_login")}}" method="post">
            <div class="form-group">
               <label for="email">Admin Email address</label>
               <input type="email" name="email" class="form-control" id="email">
            </div>
            <div class="form-group">
               <label for="password">Password</label>
               <input name="password"  type="password" class="form-control" id="password">
            </div>
            <div class="form-group form-check">
               <input name="check" type="checkbox" class="form-check-input" id="inputCheck">
               <label class="form-check-label" for="inputCheck">Remember me</label>
            </div>
            <button id="login-button" type="submit" class="btn btn-primary">Submit</button>
         </form>
      </div>
   </div>
</div>
</div>
{% endblock %}
